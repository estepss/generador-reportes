<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Reportes</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }
    header {
      background: #1f2937;
      color: white;
      padding: 20px 32px;
    }
    main {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 24px;
      padding: 24px;
    }
    .panel, .reporte {
      background: white;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      font-weight: bold;
      margin-top: 14px;
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 12px;
    }
    .primary { background: #2563eb; color: white; }
    .secondary { background: #e5e7eb; color: #111827; }
    .danger { background: #fee2e2; color: #991b1b; }
    .section-card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin-top: 14px;
      background: #fafafa;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .reporte {
      min-height: 900px;
      line-height: 1.5;
    }
    .report-header {
      border-bottom: 3px solid #111827;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    .report-title { margin: 0; font-size: 26px; }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 24px;
      margin: 18px 0;
      font-size: 14px;
    }
    .report-section {
      margin-top: 22px;
      page-break-inside: avoid;
    }
    .report-section h2 {
      font-size: 19px;
      border-bottom: 1px solid #d1d5db;
      padding-bottom: 6px;
    }
    .report-section img {
      max-width: 100%;
      margin-top: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
    }
    .placeholder {
      color: #6b7280;
      font-style: italic;
    }
     #reporteVista {
      width: 794px;
      margin: 0 auto;
    }
    
    .report-section {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    
    .report-section img {
      display: block;
      max-width: 100%;
      max-height: 420px;
      object-fit: contain;
    }
    @media print {
      body { background: white; }
      header, .panel { display: none; }
      main { display: block; padding: 0; }
      .reporte {
        box-shadow: none;
        border-radius: 0;
        padding: 28px;
      }
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
    
  </style>
</head>
<body>
  <header>
    <h1>Generador de Reportes</h1>
    <p>Completa los campos, agrega secciones e imágenes, y genera tu reporte.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Datos del documento</h2>

      <label for="titulo">Título del reporte</label>
      <input id="titulo" value="Reporte de Evaluación" oninput="generarReporte()" />

      <label for="codigo">Código</label>
      <input id="codigo" placeholder="Ej: REP-001" oninput="generarReporte()" />

      <label for="fecha">Fecha</label>
      <input id="fecha" type="date" oninput="generarReporte()" />

      <label for="responsable">Responsable</label>
      <input id="responsable" placeholder="Nombre de la persona" oninput="generarReporte()" />

      <label for="area">Área</label>
      <input id="area" placeholder="Ej: Operaciones" oninput="generarReporte()" />

      <label for="resumen">Resumen ejecutivo</label>
      <textarea id="resumen" placeholder="Escribe un resumen breve del reporte..." oninput="generarReporte()"></textarea>

      <h2>Secciones dinámicas</h2>
      <div class="actions">
        <button class="secondary" onclick="agregarSeccion()">+ Agregar sección</button>
        <button class="primary" onclick="descargarPDF()">Descargar como PDF</button>     
      </div>

      <div id="secciones"></div>
    </section>

    <section class="reporte" id="reporteVista">
    </section>
  </main>

  <script>
    const secciones = [];

    function inicializarFecha() {
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fecha').value = hoy;
    }

    function agregarSeccion() {
      const id = Date.now();
      secciones.push({ id, titulo: '', contenido: '', imagen: '' });
      renderizarEditorSecciones();
      generarReporte();
    }

    function eliminarSeccion(id) {
      const index = secciones.findIndex(s => s.id === id);
      if (index >= 0) secciones.splice(index, 1);
      renderizarEditorSecciones();
      generarReporte();
    }

    function actualizarSeccion(id, campo, valor) {
      const seccion = secciones.find(s => s.id === id);
      if (seccion) {
        seccion[campo] = valor;
        generarReporte();
      }
    }

    function cargarImagen(id, input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        actualizarSeccion(id, 'imagen', e.target.result);
      };
      reader.readAsDataURL(file);
    }

    function renderizarEditorSecciones() {
      const contenedor = document.getElementById('secciones');
      contenedor.innerHTML = '';

      secciones.forEach((seccion, i) => {
        const div = document.createElement('div');
        div.className = 'section-card';
        div.innerHTML = `
          <h3>Sección ${i + 1}</h3>

          <label>Título de la sección</label>
          <input placeholder="Ej: Infantes" value="${seccion.titulo}" oninput="actualizarSeccion(${seccion.id}, 'titulo', this.value)" />

          <label>Contenido</label>
          <textarea placeholder="Escribe el contenido de esta sección..." oninput="actualizarSeccion(${seccion.id}, 'contenido', this.value)">${seccion.contenido}</textarea>

          <label>Imagen / evidencia</label>
          <input type="file" accept="image/*" onchange="cargarImagen(${seccion.id}, this)" />

          <button class="danger" onclick="eliminarSeccion(${seccion.id})">Eliminar sección</button>
        `;
        contenedor.appendChild(div);
      });
    }

    function limpiar(texto) {
      return texto
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;')
        .replaceAll('\n', '<br>');
    }

    function generarReporte() {
      const titulo = limpiar(document.getElementById('titulo').value || 'Reporte');
      const codigo = limpiar(document.getElementById('codigo').value || '-');
      const fecha = limpiar(document.getElementById('fecha').value || '-');
      const responsable = limpiar(document.getElementById('responsable').value || '-');
      const area = limpiar(document.getElementById('area').value || '-');
      const resumen = limpiar(document.getElementById('resumen').value || 'Completa el resumen ejecutivo del reporte.');

      let html = `
        <div class="report-header">
          <h1 class="report-title">${titulo}</h1>
        </div>

        <div class="meta">
          <div><strong>Código:</strong> ${codigo}</div>
          <div><strong>Fecha:</strong> ${fecha}</div>
          <div><strong>Responsable:</strong> ${responsable}</div>
          <div><strong>Área:</strong> ${area}</div>
        </div>

        <div class="report-section">
          <h2>1. Resumen ejecutivo</h2>
          <p>${resumen}</p>
        </div>
      `;

      if (secciones.length === 0) {
        html += `<p class="placeholder">Agrega una sección para verla en el reporte.</p>`;
      }

      secciones.forEach((seccion, i) => {
        const tituloSec = limpiar(seccion.titulo || `Sección ${i + 1}`);
        const contenido = limpiar(seccion.contenido || 'Contenido pendiente.');
        html += `
          <div class="report-section">
            <h2>${i + 2}. ${tituloSec}</h2>
            <p>${contenido}</p>
            ${seccion.imagen ? `<img src="${seccion.imagen}" alt="Imagen de la sección ${i + 1}">` : ''}
          </div>
        `;
      });

      document.getElementById('reporteVista').innerHTML = html;
    }

    inicializarFecha();
    agregarSeccion();
    generarReporte();
  </script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function descargarPDF() {
  const elemento = document.getElementById("reporteVista");
  const titulo = document.getElementById("titulo").value || "Reporte";

  const nombreArchivo = titulo
    .trim()
    .replace(/[<>:"/\\|?*]+/g, "")
    .replace(/\s+/g, "_");

  html2pdf()
    .set({
      margin: [12, 12, 12, 12],
      filename: `${nombreArchivo}.pdf`,
      image: { type: "jpeg", quality: 0.98 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        scrollY: 0
      },
      jsPDF: {
        unit: "mm",
        format: "a4",
        orientation: "portrait"
      },
      pagebreak: {
        mode: ["avoid-all", "css", "legacy"],
        avoid: [".report-header", ".meta", ".report-section", "img"]
      }
    })
    .from(elemento)
    .save();
}
</script>
</body>
</html>
